<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REWARD HUB - Official Site</title>
    <!-- Tailwind CSS & Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #09090b; color: #f4f4f5; overflow-x: hidden; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .animate-marquee { display: inline-block; animation: marquee 25s linear infinite; }
        @keyframes marquee { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }
        .glass { background: rgba(24, 24, 27, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .gradient-text { background: linear-gradient(to right, #ef4444, #fb923c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- News Ticker -->
    <div id="news-bar" class="fixed top-0 left-0 w-full bg-orange-600 text-white py-1.5 z-50 overflow-hidden hidden shadow-lg">
        <div id="news-text" class="animate-marquee whitespace-nowrap font-black uppercase tracking-widest text-[10px] italic">
            UPDATING NETWORK STATUS...
        </div>
    </div>

    <div class="max-w-7xl mx-auto pt-10">
        <!-- Header Section -->
        <header class="glass rounded-3xl p-6 md:p-10 mb-6 relative overflow-hidden">
            <div class="absolute top-0 right-0 w-64 h-64 bg-red-600/10 blur-3xl rounded-full"></div>
            <div class="flex flex-col md:flex-row justify-between items-start gap-6">
                <div class="relative z-10">
                    <!-- Added pr-8 to fix 'B' clipping -->
                    <h1 class="text-5xl md:text-8xl font-black italic tracking-tighter gradient-text leading-none mb-4 pr-10 py-2">REWARD HUB</h1>
                    <p class="text-zinc-500 font-bold uppercase tracking-[0.3em] text-xs opacity-70">Powered by Billjamin • Official Instant Payment Hub</p>
                </div>
                <div class="flex flex-col items-end z-10">
                    <span class="text-zinc-500 text-[10px] font-black uppercase tracking-widest mb-1">Current Prize Pool</span>
                    <div id="total-prize" class="text-6xl md:text-8xl font-black text-orange-500 italic tracking-tighter leading-none">$0.00</div>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-12 gap-6">
            
            <!-- Left Side -->
            <div class="md:col-span-8 flex flex-col gap-6">
                
                <!-- Improved Timer Section -->
                <div class="glass rounded-3xl p-8 flex flex-col md:flex-row items-center justify-between gap-8">
                    <div>
                        <div class="flex items-center gap-2 mb-4">
                            <div class="w-2.5 h-2.5 bg-emerald-500 rounded-full animate-pulse shadow-lg shadow-emerald-500/50"></div>
                            <span class="text-emerald-500 font-black text-[10px] uppercase tracking-widest italic" id="status-label">Next Draw In:</span>
                        </div>
                        <div class="flex gap-6" id="clock-container">
                            <div class="flex flex-col"><span class="text-zinc-600 text-[10px] font-black uppercase mb-1 tracking-widest">Hrs</span><div id="h" class="text-6xl font-mono text-white italic leading-none tabular-nums">00</div></div>
                            <div class="flex flex-col"><span class="text-zinc-600 text-[10px] font-black uppercase mb-1 tracking-widest">Min</span><div id="m" class="text-6xl font-mono text-white italic leading-none tabular-nums">00</div></div>
                            <div class="flex flex-col"><span class="text-zinc-600 text-[10px] font-black uppercase mb-1 tracking-widest">Sec</span><div id="s" class="text-6xl font-mono text-white italic leading-none tabular-nums">00</div></div>
                        </div>
                    </div>
                    <div class="text-right">
                        <span class="text-zinc-600 text-[10px] font-black uppercase tracking-widest">Ticket Price</span>
                        <div id="display-price" class="text-6xl font-black text-white italic tracking-tighter leading-none mt-2">$0.50</div>
                    </div>
                </div>

                <!-- Registration Form -->
                <div id="reg-form-container" class="glass rounded-3xl p-8 md:p-10">
                    <h3 class="text-3xl font-black italic uppercase tracking-tighter mb-10 flex items-center gap-3">
                        <span class="w-8 h-1 bg-gradient-to-r from-red-600 to-transparent rounded-full"></span>
                        Buy Ticket Now
                    </h3>
                    
                    <div class="space-y-8">
                        <div class="space-y-4">
                            <label class="text-[10px] font-black text-zinc-500 uppercase tracking-widest block pl-1">Your Telegram Username</label>
                            <input id="p-name" type="text" placeholder="@username" class="w-full bg-zinc-900/80 border border-zinc-800 rounded-2xl p-5 text-white font-bold focus:border-orange-500/50 outline-none transition-all placeholder:text-zinc-700 text-lg">
                        </div>
                        
                        <div class="space-y-4">
                            <label class="text-[10px] font-black text-zinc-500 uppercase tracking-widest block pl-1">Payment Method</label>
                            <div class="grid grid-cols-3 gap-4">
                                <button onclick="setMethod('bkash')" id="btn-bkash" class="method-btn p-5 glass rounded-2xl flex flex-col items-center gap-3 hover:border-orange-500/30 transition-all group active:scale-95">
                                    <img src="https://freelogopng.com/images/all_img/1656234744bkash-app-logo_png.png" class="h-10 object-contain group-hover:scale-110 transition-transform">
                                    <span class="text-[10px] font-black uppercase tracking-widest">bKash</span>
                                </button>
                                <button onclick="setMethod('nagad')" id="btn-nagad" class="method-btn p-5 glass rounded-2xl flex flex-col items-center gap-3 hover:border-orange-500/30 transition-all group active:scale-95">
                                    <img src="https://freelogopng.com/images/all_img/1679248787Nagad-Logo.png" class="h-10 object-contain group-hover:scale-110 transition-transform">
                                    <span class="text-[10px] font-black uppercase tracking-widest">Nagad</span>
                                </button>
                                <button onclick="setMethod('binance')" id="btn-binance" class="method-btn p-5 glass rounded-2xl flex flex-col items-center gap-3 hover:border-orange-500/30 transition-all group active:scale-95">
                                    <img src="https://freelogopng.com/images/all_img/1653069151binance-coin-logo-png.png" class="h-10 object-contain group-hover:scale-110 transition-transform">
                                    <span class="text-[10px] font-black uppercase tracking-widest">Binance</span>
                                </button>
                            </div>
                        </div>

                        <div id="payment-info" class="p-6 bg-gradient-to-br from-orange-600/10 to-red-600/5 border border-orange-600/20 rounded-2xl hidden">
                            <div class="flex justify-between items-center">
                                <div>
                                    <span class="text-[10px] font-black text-orange-500 uppercase tracking-widest block mb-1">Total Payable</span>
                                    <div class="text-4xl font-black text-white italic tracking-tighter" id="pay-amount">0.00 BDT</div>
                                </div>
                                <div class="text-right">
                                    <span class="text-[10px] font-black text-zinc-600 uppercase tracking-widest block mb-1" id="method-text">Payment Method</span>
                                    <div class="text-sm font-bold text-zinc-400" id="rate-display">1 USD = 126 BDT</div>
                                </div>
                            </div>
                        </div>

                        <button onclick="handleBuy()" class="w-full py-6 bg-gradient-to-r from-red-600 to-orange-500 rounded-2xl text-white font-black uppercase tracking-[0.2em] italic hover:scale-[1.01] active:scale-[0.98] transition-all shadow-2xl shadow-orange-900/30 text-xl">
                            Buy Now
                        </button>
                    </div>
                </div>
            </div>

            <!-- Right Side: Lists -->
            <div class="md:col-span-4 flex flex-col gap-6">
                <!-- Participants List -->
                <div class="glass rounded-3xl p-6 flex flex-col h-[450px]">
                    <div class="flex justify-between items-center mb-6">
                        <h4 class="text-xs font-black uppercase tracking-widest text-zinc-400 italic">Participants</h4>
                        <span id="p-count" class="bg-zinc-800 text-emerald-400 text-[10px] font-black px-3 py-1 rounded-full border border-zinc-700">0</span>
                    </div>
                    <div id="participants-list" class="flex-1 overflow-y-auto space-y-3 pr-2">
                        <!-- JS inject -->
                    </div>
                </div>

                <!-- Winners List -->
                <div class="glass rounded-3xl p-6 flex flex-col overflow-hidden">
                    <h4 class="text-xs font-black uppercase tracking-widest text-zinc-400 italic mb-6">Latest Winners</h4>
                    <div id="winners-list" class="space-y-4">
                        <!-- JS inject -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // SHEET LINKS
        const SETTINGS_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTy1oeynHtYTHDA40GI-vc9GpKt5JBJu6MVpf3r5S7A22ZpUl1OgSNV5mu5WWZwRfh3OZIZv35dHA78/pub?gid=0&single=true&output=csv";
        const WINNERS_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTy1oeynHtYTHDA40GI-vc9GpKt5JBJu6MVpf3r5S7A22ZpUl1OgSNV5mu5WWZwRfh3OZIZv35dHA78/pub?gid=1734805646&single=true&output=csv";
        const PARTICIPANTS_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTy1oeynHtYTHDA40GI-vc9GpKt5JBJu6MVpf3r5S7A22ZpUl1OgSNV5mu5WWZwRfh3OZIZv35dHA78/pub?gid=691231359&single=true&output=csv";

        let appSettings = {
            ticketPrice: 0.50,
            exchangeRate: 126,
            telegramAdmin: "Billjamin12", // Default
            binanceId: "882910392"
        };
        let selectedMethod = null;

        async function fetchData() {
            try {
                // Fetch Settings
                const sRes = await fetch(SETTINGS_CSV + '&cache=' + Date.now());
                const sText = await sRes.text();
                const sRows = sText.split('\n').filter(r => r.trim() !== "");
                sRows.forEach(row => {
                    const cols = row.split(',').map(c => c.trim().replace(/^"|"$/g, ''));
                    if (cols.length < 2) return;
                    const [key, val] = cols;
                    if (key === 'ticketPrice') appSettings.ticketPrice = parseFloat(val) || 0.5;
                    if (key === 'exchangeRate') {
                        appSettings.exchangeRate = parseFloat(val) || 126;
                        document.getElementById('rate-display').innerText = `1 USD = ${appSettings.exchangeRate} BDT`;
                    }
                    if (key === 'telegramAdmin' && val) appSettings.telegramAdmin = val.replace('@', '');
                    if (key === 'news' && val) {
                        document.getElementById('news-bar').classList.remove('hidden');
                        document.getElementById('news-text').innerText = val;
                    }
                });
                document.getElementById('display-price').innerText = `$${appSettings.ticketPrice.toFixed(2)}`;

                // Fetch Participants
                const pRes = await fetch(PARTICIPANTS_CSV + '&cache=' + Date.now());
                const pText = await pRes.text();
                const participants = pText.split('\n').filter(r => r.trim() !== "").slice(1).map(r => r.trim().replace(/^"|"$/g, ''));
                document.getElementById('p-count').innerText = participants.length;
                document.getElementById('participants-list').innerHTML = participants.map(name => `
                    <div class="bg-zinc-900/40 p-4 rounded-2xl border border-white/[0.03] flex justify-between items-center">
                        <span class="text-zinc-200 font-bold italic text-sm">@${name}</span>
                        <div class="w-1.5 h-1.5 bg-emerald-500 rounded-full"></div>
                    </div>
                `).reverse().join('');
                document.getElementById('total-prize').innerText = `$${(participants.length * appSettings.ticketPrice * 0.6).toFixed(2)}`;

                // Fetch Winners
                const wRes = await fetch(WINNERS_CSV + '&cache=' + Date.now());
                const wText = await wRes.text();
                const wRows = wText.split('\n').filter(r => r.trim() !== "").slice(1);
                document.getElementById('winners-list').innerHTML = wRows.map((r, i) => {
                    const parts = r.split(',').map(c => c.trim().replace(/^"|"$/g, ''));
                    if (parts.length < 2) return '';
                    return `
                        <div class="flex items-center justify-between p-4 bg-zinc-900/60 border border-white/[0.03] rounded-2xl">
                            <div class="flex items-center gap-4">
                                <span class="text-zinc-700 font-black text-[10px]">#${(i+1).toString().padStart(2, '0')}</span>
                                <span class="font-black italic text-zinc-100 uppercase tracking-tighter text-sm">${parts[0]}</span>
                            </div>
                            <span class="text-emerald-500 font-black italic tracking-tighter text-lg">$${parseFloat(parts[1]).toFixed(2)}</span>
                        </div>
                    `;
                }).join('');

            } catch (e) {
                console.error("Sync Failed", e);
            }
        }

        function setMethod(m) {
            selectedMethod = m;
            document.querySelectorAll('.method-btn').forEach(btn => btn.classList.remove('border-orange-500/50', 'bg-orange-500/5'));
            document.getElementById(`btn-${m}`).classList.add('border-orange-500/50', 'bg-orange-500/5');
            document.getElementById('payment-info').classList.remove('hidden');
            const amtElem = document.getElementById('pay-amount');
            if (m === 'binance') {
                amtElem.innerText = `$${appSettings.ticketPrice.toFixed(2)} USDT`;
            } else {
                amtElem.innerText = `${(appSettings.ticketPrice * appSettings.exchangeRate).toFixed(0)} BDT`;
            }
            document.getElementById('method-text').innerText = `Via ${m.toUpperCase()}`;
        }

        function handleBuy() {
            const name = document.getElementById('p-name').value;
            if (!name) return alert("Enter Telegram Username!");
            if (!selectedMethod) return alert("Select Payment Method!");

            const msg = `🎟️ *NEW LOTTERY ENTRY*\n\nUser: ${name}\nMethod: ${selectedMethod.toUpperCase()}\nAmount: ${document.getElementById('pay-amount').innerText}\n\nPlease check my payment!`;
            window.open(`https://t.me/${appSettings.telegramAdmin}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        // REAL-TIME TIMER: Counts down to next Midnight
        function startTimer() {
            function update() {
                const now = new Date();
                const nextDraw = new Date();
                nextDraw.setHours(24, 0, 0, 0); // Next midnight
                
                const diff = nextDraw - now;
                const h = Math.floor(diff / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                
                document.getElementById('h').innerText = String(h).padStart(2, '0');
                document.getElementById('m').innerText = String(m).padStart(2, '0');
                document.getElementById('s').innerText = String(s).padStart(2, '0');
            }
            update();
            setInterval(update, 1000);
        }

        startTimer();
        fetchData();
        setInterval(fetchData, 15000); // Auto update lists every 15s
    </script>
</body>
</html>
